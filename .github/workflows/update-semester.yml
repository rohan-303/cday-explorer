name: Add New Semester

on:
  workflow_dispatch:
    inputs:
      semester:
        description: 'Semester to add (e.g., "Spring 2026" or "Fall 2026")'
        required: true
        type: string
      skip_suggestions:
        description: 'Skip AI suggestion generation'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run update pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
        run: |
          cd ${{ github.workspace }}
          
          # Step 1: Fetch and classify new projects
          python scripts/update_semester.py \
            --semester "${{ inputs.semester }}" \
            ${{ inputs.skip_suggestions && '--skip-suggestions' || '' }} \
            --skip-analytics
          
          # Step 2: Recompute analytics (keywords, similarity, analytics.json)
          python scripts/compute_analytics.py
          
          echo "Pipeline complete!"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json analytics.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: add ${{ inputs.semester }} projects (automated)"
          git push

  deploy:
    needs: update
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # Get the latest commit from the update job

      - name: Pull latest
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
